services:
  postgres:
    image: postgres:16-alpine
    container_name: buzon_utmach_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-buzon}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-buzon_secret}
      POSTGRES_DB: ${POSTGRES_DB:-buzon_utmach}
    ports:
      - "5432:5432"
    volumes:
      - buzon_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-buzon} -d ${POSTGRES_DB:-buzon_utmach}"]
      interval: 5s
      timeout: 5s
      retries: 5

