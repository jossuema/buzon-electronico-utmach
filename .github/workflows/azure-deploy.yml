name: Deploy to Azure

# Despliega a Azure App Service (Web App for Containers) cuando hay push a main.
# Construye la imagen en Azure Container Registry y actualiza la Web App.
# Las migraciones de Prisma se ejecutan al iniciar el contenedor (ver Dockerfile).

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write # requerido para el login OIDC con Azure
  contents: read

env:
  IMAGE_NAME: buzon-utmach

jobs:
  deploy:
    name: Build & deploy
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login en Azure (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Construir imagen en ACR
        run: |
          az acr build \
            --registry "${{ vars.AZURE_ACR_NAME }}" \
            --image "${IMAGE_NAME}:${{ github.sha }}" \
            --image "${IMAGE_NAME}:latest" \
            .

      - name: Actualizar Web App con la nueva imagen
        run: |
          az webapp config container set \
            --name "${{ vars.AZURE_WEBAPP_NAME }}" \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}" \
            --container-image-name "${{ vars.AZURE_ACR_NAME }}.azurecr.io/${IMAGE_NAME}:${{ github.sha }}"

      - name: Reiniciar Web App
        run: |
          az webapp restart \
            --name "${{ vars.AZURE_WEBAPP_NAME }}" \
            --resource-group "${{ vars.AZURE_RESOURCE_GROUP }}"
