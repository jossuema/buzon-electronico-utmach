name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  build:
    name: Lint y build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Instalar dependencias
        run: npm ci

      - name: Generar Prisma Client
        run: npx prisma generate

      - name: Lint
        run: npm run lint

      - name: Build
        # El build no se conecta a la base de datos (páginas dinámicas);
        # las variables solo deben existir.
        env:
          DATABASE_URL: postgresql://user:pass@localhost:5432/db?schema=public
          AUTH_SECRET: ci-placeholder-secret
        run: npm run build
